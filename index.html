<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacticalFlow Pro - Analizador de Élite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --pitch-green: #1b5e20;
            --ui-bg: #0a0a0a;
            --card-bg: #161616;
            --accent: #00e676;
            --team-a: #ff5252;
            --team-b: #448aff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--ui-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* --- Header y Dashboard --- */
        .header { width: 100%; padding: 20px; text-align: center; background: var(--card-bg); border-bottom: 2px solid #333; }
        
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: 95%;
        }

        /* --- Campo de Juego --- */
        #pitch-container {
            position: relative;
            width: 700px;
            height: 450px;
            background-color: var(--pitch-green);
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .line { position: absolute; background: rgba(255,255,255,0.5); }
        .center-line { left: 50%; width: 2px; height: 100%; }
        .center-circle { 
            left: 50%; top: 50%; width: 80px; height: 80px; 
            border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; 
            transform: translate(-50%, -50%); 
        }

        .player {
            position: absolute;
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 2px solid white;
            transition: all 0.2s linear;
            z-index: 10;
        }

        /* --- Paneles Lateral / Inferior --- */
        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            min-width: 300px;
            flex: 1;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 50px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-play { background: var(--accent); color: black; }
        .btn-analyze { background: #ffc107; color: black; }
        .btn-download { background: #555; color: white; }
