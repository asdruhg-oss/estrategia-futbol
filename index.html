<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacticalFlow Pro - Consultor de Sistemas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --pitch-green: #245e2c;
            --ui-bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #00e676;
            --team-a: #ff4444;
            --team-b: #448aff;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--ui-bg);
            color: #eee;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header --- */
        .header { width: 100%; padding: 15px; background: #000; text-align: center; border-bottom: 2px solid var(--accent); }

        /* --- Layout --- */
        .main-grid {
            display: grid;
            grid-template-columns: 750px 350px;
            gap: 20px;
            margin: 20px;
        }

        /* --- Campo --- */
        #pitch {
            position: relative;
            width: 700px;
            height: 450px;
            background: var(--pitch-green);
            border: 4px solid #fff;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .pitch-line { position: absolute; background: rgba(255,255,255,0.6); }
        .c-line { left: 50%; width: 2px; height: 100%; }
        .c-circle { left: 50%; top: 50%; width: 90px; height: 90px; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); }
        .area-l { left: 0; top: 20%; width: 120px; height: 60%; border: 2px solid #fff; position: absolute; }
        .area-r { right: 0; top: 20%; width: 120px; height: 60%; border: 2px solid #fff; position: absolute; }

        .player {
            position: absolute;
            width: 16px; height: 16px;
            border-radius: 50%;
            border: 2px solid #fff;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
            display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold;
        }
        .t-a { background: var(--team-a); }
        .t-b { background: var(--team-b); }

        /* --- UI Panels --- */
        .panel { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; justify-content: center; }
        
        select, button {
            padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;
        }
        select { background: #333; color: white; }
        .
