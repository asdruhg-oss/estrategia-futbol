<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estrategia Fútbol Pro - Live</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1b5e20; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 480px; box-sizing: border-box; }
        
        /* Estilo del Cronómetro */
        .timer-display { background: #000; color: #ffeb3b; font-family: 'Courier New', Courier, monospace; font-size: 3rem; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 3px solid #444; }
        .timer-controls { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-timer { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .start { background-color: #2e7d32; }
        .pause { background-color: #f57c00; }
        .reset { background-color: #d32f2f; }

        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 13px; color: #333; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .btn-main { width: 100%; padding: 15px; background-color: #1b5e20; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        #resultado { margin-top: 15px; padding: 15px; border-radius: 6px; text-align: center; display: none; font-weight: bold; border: 1px solid transparent; }
        .success { background-color: #d4edda; color: #155724; }
        .danger { background-color: #f8d7da; color: #721c24; }
        .chart-container { margin-top: 20px; height: 300px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:#1b5e20;">Match Tracker</h2>

    <div class="timer-display" id="display">00:00</div>
    <div class="timer-controls">
        <button class="btn-timer start" onclick="iniciarTimer()">Iniciar</button>
        <button class="btn-timer pause" onclick="pausarTimer()">Pausa</button>
        <button class="btn-timer reset" onclick="reiniciarTimer()">Reset</button>
    </div>
    
    <div class="input-group">
        <label>Nombre del Equipo:</label>
        <input type="text" id="equipo" placeholder="Ej: Real Madrid">
    </div>
    <div class="input-group">
        <label>Posesión (%):</label>
        <input type="number" id="posesion" value="50">
    </div>
    <div class="input-group">
        <label>Diferencia de Goles:</label>
        <input type="number" id="goles" value="0">
    </div>

    <button class="btn-main" onclick="actualizarAnalisis()">ANALIZAR AHORA</button>

    <div id="resultado"></div>

    <div class="chart-container">
        <canvas id="graficaTactica"></canvas>
    </div>
</div>

<script>
    // --- LÓGICA DEL CRONÓMETRO ---
    let tiempoSegundos = 0;
    let intervalo;
    let corriendo = false;

    function iniciarTimer() {
        if (!corriendo) {
            corriendo = true;
            intervalo = setInterval(() => {
                tiempoSegundos++;
                actualizarDisplay();
            }, 1000);
        }
    }

    function pausarTimer() {
        corriendo = false;
        clearInterval(intervalo);
    }

    function reiniciarTimer() {
        pausarTimer();
        tiempoSegundos = 0;
        actualizarDisplay();
    }

    function actualizarDisplay() {
        const mins = Math.floor(tiempoSegundos / 60);
        const segs = tiempoSegundos % 60;
        document.getElementById('display').innerText = 
            `${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
    }

    // --- LÓGICA DE ANÁLISIS ---
    let miGrafica;

    function actualizarAnalisis() {
        const equipoNom = document.getElementById('equipo').value || "Equipo";
        const minActual = Math.floor(tiempoSegundos / 60); // Tomamos el minuto del cronómetro
        const pos = parseInt(document.getElementById('posesion').value);
        const gol = parseInt(document.getElementById('goles').value);
        const resDiv = document.getElementById('resultado');

        resDiv.style.display = "block";
        
        // Decisión basada en tiempo real
        if (gol < 0 && minActual > 75) {
            resDiv.innerText = `¡${equipoNom.toUpperCase()} AL ATAQUE! Minuto crítico.`;
            resDiv.className = "danger";
        } else if (gol > 0 && minActual > 85) {
            resDiv.innerText = "ORDEN: DEFENDER EL RESULTADO";
            resDiv.className = "success";
        } else {
            resDiv.innerText = "MANTENER POSICIONES";
            resDiv.className = "success";
        }

        // Gráfica
        const ataque = (gol < 0) ? 90 : 60;
        const defensa = (gol > 0) ? 90 : 50;
        const cansancio = (minActual > 70) ? 30 : 80;

        if (miGrafica) { miGrafica.destroy(); }
        const ctx = document.getElementById('graficaTactica').getContext('2d');
        miGrafica = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Ataque', 'Defensa', 'Posesión', 'Energía', 'Presión'],
                datasets: [{
                    label: `Estado al min ${minActual}`,
                    data: [ataque, defensa, pos, cansancio, 70],
                    backgroundColor: 'rgba(27, 94, 32, 0.2)',
                    borderColor: '#1b5e20',
                    borderWidth: 2
                }]
            },
            options: { scales: { r: { min: 0, max: 100 } }, maintainAspectRatio: false }
        });
    }
</script>

</body>
</html>
