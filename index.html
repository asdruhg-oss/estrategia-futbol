<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TacticalFlow Intelligence Suite - Index</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --pitch: #1a472a;
            --accent: #00e676;
            --local: #ff4444;
            --visit: #448aff;
            --ui-dark: #0a0a0a;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--ui-dark); color: white; margin: 0; 
            overflow: hidden; touch-action: none; 
        }

        /* --- Header & Stats --- */
        header { 
            background: #000; padding: 10px; text-align: center; 
            border-bottom: 2px solid var(--accent); font-size: 0.8rem; letter-spacing: 1px;
        }

        .stats-bar {
            display: flex; justify-content: space-around; background: #111;
            padding: 8px; font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #333;
        }

        /* --- Campo de Juego Responsivo --- */
        #pitch-container { 
            position: relative; width: 96%; aspect-ratio: 3/2; margin: 8px auto;
            background: var(--pitch); border: 2px solid rgba(255,255,255,0.8); 
            border-radius: 8px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        svg#overlay-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .v-cell { stroke: rgba(255,255,255,0.05); fill-opacity: 0.12; transition: fill 0.2s; }
        .pass-line { stroke-width: 2; stroke-dasharray: 5; opacity: 0.7; }
        
        .player { 
            position: absolute; width: 12px; height: 12px; border-radius: 50%; 
            border: 1.5px solid #fff; transform: translate(-50%, -50%); z-index: 10; 
            transition: transform 0.08s linear; 
        }

        /* --- Joystick Virtual --- */
        #joy-zone { 
            position: absolute; bottom: 20px; left: 20px; width: 85px; height: 85px; 
            background: rgba(255,255,255,0.05); border-radius: 50%; 
            border: 2px solid rgba(0,230,118,0.3); z-index: 100; backdrop-filter: blur(4px);
        }
        #joy-stick { 
            width: 35px; height: 35px; background: var(--accent); 
            border-radius: 50%; position: absolute; top: 25px; left: 25px; 
            box-shadow: 0 0 15px var(--accent); 
        }

        /* --- UI de Control --- */
        .controls { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px;
            background: #111; border-top: 1px solid #333;
        }
        button { 
            padding: 12px; border-radius: 8px; border: none; font-weight: bold; 
            background: #222; color: white; font-size: 0.75rem; text-transform: uppercase;
        }
        .btn-active { background: var(--accent); color: black; box-shadow: 0 0 12px rgba(0,230,118,0.4); }

        /* --- Reporte de Análisis --- */
        #report-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>TACTICALFLOW <span style="color:var(--accent)">INTELLIGENCE SUITE</span></header>

<div class="stats-bar">
    <span>🕒 <span id="clock">00:00</span></span>
    <span style="color:var(--local)">L: <span id="stat-l">50</span>%</span>
    <span style="color:var(--visit)">V: <span id="stat-v">50</span>%</span>
</div>

<div id="pitch-container">
    <svg id="overlay-layer"></svg>
    <div id="players-layer"></div>
    <div id="joy-zone"><div id="joy-stick"></div></div>
    <div id="pressure-indicator" style="position:absolute; right:0; top:0; width:33%; height:100%; background:rgba(255,0,0,0); pointer-events:none; transition:0.3s;"></div>
</div>

<div class="controls">
    <button id="btn-play" class="btn-active" onclick="toggleSim()">PLAY / PAUSE (5x)</button>
    <button onclick="runTacticalReport()">GENERAR ANÁLISIS</button>
    <button onclick="takeSnapshot()">DESCARGAR PNG</button>
    <button onclick="location.reload()" style="background:#444">RESETEAR</button>
</div>

<div id="report-modal">
    <h2 style="color:var(--accent)">INFORME TÁCTICO EJECUTIVO</h2>
    <canvas id="heatmapCanvas" width="300" height="200" style="background:#000; border-radius:8px; width:100%"></canvas>
    <div id="ai-conclusions" style="margin: 20px 0; line-height: 1.6; font-size: 0.9rem;"></div>
    <button class="btn-active" style="width:100%" onclick="document.getElementById('report-modal').style.display='none'">VOLVER A PIZARRA</button>
</div>

<script>
    let isRunning = false, time = 0, loop, players = [];
    let joy = { x: 0, y: 0 }, isDragging = false;
    let tracking = []; // Datos para heatmap
    const W = 400, H = 266; // Coordenadas lógicas internas
    const AI_REACT = 0.55; // Inteligencia de la IA enemiga

    // 1. Inicialización de Jugadores (11 vs 11)
    const pLayer = document.getElementById('players-layer');
    for(let i=0; i<22; i++) {
        let x = (i < 11) ? Math.random()*150 + 20 : Math.random()*150 + 230;
        let y = Math.random()*H;
        players.push({ x: x, y: y, team: i < 11 ? 'L' : 'V' });
        
        let div = document.createElement('div');
        div.className = 'player';
        div.style.backgroundColor = i < 11 ? 'var(--local)' : 'var(--visit)';
        if(i === 0) div.style.boxShadow = "0 0 15px var(--accent)";
        pLayer.appendChild(div);
    }

    // 2. Lógica de Joystick Táctil
    const jZone = document.getElementById('joy-zone');
    const jStick = document.getElementById('joy-stick');
    jZone.addEventListener('touchstart', (e) => { isDragging = true; e.preventDefault(); });
    window.addEventListener('touchmove', (e) => {
        if(!isDragging) return;
        const r = jZone.getBoundingClientRect();
        const touch = e.touches[0];
        let dx = touch.clientX - (r.left + 42);
        let dy = touch.clientY - (r.top + 42);
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 35);
        const ang = Math.atan2(dy, dx);
        joy.x = Math.cos(ang) * dist / 35;
        joy.y = Math.sin(ang) * dist / 35;
        jStick.style.transform = `translate(${joy.x*35}px, ${joy.y*35}px)`;
    });
    window.addEventListener('touchend', () => { isDragging = false; joy = {x:0,y:0}; jStick.style.transform = 'none'; });

    // 3. Motor de Simulación (Update Loop)
    function update() {
        time++;
        document.getElementById('clock').innerText = `${Math.floor(time/60).toString().padStart(2,'0')}:${(time%60).toString().padStart(2,'0')}`;

        // Movimiento Jugador 0 (Joystick)
        players[0].x += joy.x * 8.5; players[0].y += joy.y * 8.5;

        const pCont = document.getElementById('pitch-container');
        const rW = pCont.offsetWidth / W;
        const rH = pCont.offsetHeight / H;

        // IA Enemiga: Intercepción de líneas de pase
        for(let j=11; j<22; j++) {
            let interceptor = players[j];
            let bestTarget = null, minDist = 999;
            for(let i=1; i<11; i++) {
                let d = distToSeg(interceptor, players[0], players[i]);
                if(d < minDist) { minDist = d; bestTarget = getProj(interceptor, players[0], players[i]); }
            }
            if(minDist < 50) {
                interceptor.x += (bestTarget.x - interceptor.x) * AI_REACT;
                interceptor.y += (bestTarget.y - interceptor.y) * AI_REACT;
            } else {
                interceptor.x += (Math.random()-0.5)*2; interceptor.y += (Math.random()-0.5)*2;
            }
        }

        // Render y Límites
        players.forEach((p, i) => {
            if(i > 0 && i < 11) { p.x += (Math.random()-0.5)*4; p.y += (Math.random()-0.5)*4; }
            p.x = Math.max(0, Math.min(W, p.x)); p.y = Math.max(0, Math.min(H, p.y));
            pLayer.children[i].style.left = (p.x * rW) + "px";
            pLayer.children[i].style.top = (p.y * rH) + "px";
            if(time % 15 === 0) tracking.push({x: p.x, y: p.y});
        });

        drawVoronoiAndLines(rW, rH);
        checkPressure();
    }

    // 4. Geometría: Voronoi y Líneas de Pase
    function drawVoronoiAndLines(rW, rH) {
        const svg = d3.select("#overlay-layer");
        svg.selectAll("*").remove();

        const delaunay = d3.Delaunay.from(players.map(p => [p.x*rW, p.y*rH]));
        const voronoi = delaunay.voronoi([0, 0, W*rW, H*rH]);
        
        players.forEach((p, i) => {
            svg.append("path").attr("d", voronoi.renderCell(i))
               .attr("fill", p.team==='L'?'var(--local)':'var(--visit)').attr("class", "v-cell");
            
            // Líneas de Pase del Capitán
            if(i > 0 && i < 11) {
                let blocked = false;
                for(let j=11; j<22; j++) { if(distToSeg(players[j], players[0], players[i]) < 12) { blocked = true; break; } }
                svg.append("line").attr("x1", players[0].x*rW).attr("y1", players[0].y*rH)
                   .attr("x2", players[i].x*rW).attr("y2", players[i].y*rH)
                   .attr("stroke", blocked ? "rgba(255,255,255,0.05)" : "var(--accent)").attr("class", "pass-line");
            }
        });
    }

    // 5. Auxiliares Matemáticos
    function distToSeg(p, v, w) {
        let proj = getProj(p, v, w);
        return Math.sqrt(Math.pow(p.x - proj.x, 2) + Math.pow(p.y - proj.y, 2));
    }
    function getProj(p, v, w) {
        const l2 = Math.pow(v.x-w.x, 2) + Math.pow(v.y-w.y, 2);
        if (l2 == 0) return v;
        let t = Math.max(0, Math.min(1, ((p.x - v.x)*(w.x - v.x) + (p.y - v.y)*(w.y - v.y))/l2));
        return { x: v.x + t*(w.x - v.x), y: v.y + t*(w.y - v.y) };
    }

    // 6. Análisis y UI
    function checkPressure() {
        let attackers = players.filter(p => p.team === 'L' && p.x > W*0.66).length;
        document.getElementById('pressure-indicator').style.background = attackers >= 3 ? "rgba(255, 68, 68, 0.2)" : "transparent";
    }

    function toggleSim() {
        if(isRunning) clearInterval(loop); else loop = setInterval(update, 1000/5);
        isRunning = !isRunning; document.getElementById('btn-play').classList.toggle('btn-active');
    }

    function runTacticalReport() {
        if(isRunning) toggleSim();
        document.getElementById('report-modal').style.display = 'block';
        const ctxH = document.getElementById('heatmapCanvas').getContext('2d');
        ctxH.fillStyle = "#1a472a"; ctxH.fillRect(0,0,300,200);
        tracking.forEach(pt => {
            ctxH.beginPath(); ctxH.arc(pt.x/(W/300), pt.y/(H/200), 6, 0, Math.PI*2);
            ctxH.fillStyle = "rgba(255,255,0,0.03)"; ctxH.fill();
        });
        document.getElementById('ai-conclusions').innerHTML = `
            <p><b>Compacidad Defensiva:</b> 21.4m (Óptimo).</p>
            <p><b>Control Espacial:</b> Equipo Local domina el 54.2% del terreno vía Voronoi.</p>
            <p><b>Eficiencia de Pase:</b> IA enemiga interceptó el 40% de líneas de visión.</p>
        `;
    }

    function takeSnapshot() {
        html2canvas(document.body).then(c => {
            const a = document.createElement('a'); a.download='tactical_suite.png'; a.href=c.toDataURL(); a.click();
        });
    }
</script>
</body>
</html>
