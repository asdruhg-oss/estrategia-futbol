<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacticalFlow Intelligence - Elite Soccer Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --pitch-green: #1a472a;
            --pitch-line: rgba(255,255,255,0.8);
            --ui-dark: #0a0a0a;
            --accent: #00e676;
            --local-color: #ff5252;
            --visit-color: #448aff;
        }

        body { font-family: 'Inter', sans-serif; background: var(--ui-dark); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* Dashboard Layout */
        .top-bar { width: 100%; padding: 15px; background: #000; border-bottom: 2px solid var(--accent); text-align: center; }
        .main-grid { display: grid; grid-template-columns: 800px 350px; gap: 20px; margin: 20px; }

        /* Pitch & Voronoi */
        #pitch-wrapper { position: relative; width: 800px; height: 500px; background: var(--pitch-green); border: 4px solid white; border-radius: 4px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        svg#voronoi-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .voronoi-cell { stroke: rgba(255,255,255,0.1); stroke-width: 1px; fill-opacity: 0.3; transition: fill 0.3s; }
        
        /* Zonas de Presión */
        #pressure-zone { position: absolute; right: 0; top: 0; width: 33%; height: 100%; background: rgba(255, 255, 0, 0); transition: 0.5s; z-index: 1; pointer-events: none; }
        .pressure-active { background: rgba(255, 82, 82, 0.2) !important; border-left: 2px dashed red; }

        /* UI Elements */
        .panel { background: #161616; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .player { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; z-index: 10; transform: translate(-50%, -50%); }
        .btn-group { margin: 20px; display: flex; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: black; }
        .btn-danger { background: #ff5252; color: white; }

        #final-report { display: none; width: 1170px; margin: 20px; padding: 30px; background: #111; border-radius: 15px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>TACTICALFLOW <span style="color:var(--accent)">V-ANALYTICS</span></h1>
    </div>

    <div class="btn-group">
        <button class="btn-primary" onclick="toggleSim()">PLAY / PAUSE (5x)</button>
        <button class="btn-danger" onclick="executeTacticalAnalysis()">EJECUTAR ANÁLISIS TÁCTICO</button>
        <button style="background:#555; color:white;" onclick="downloadScreenshot()">DESCARGAR CAPTURA</button>
    </div>

    <div class="main-grid">
        <div id="capture-area">
            <div id="pitch-wrapper">
                <div id="pressure-zone"></div>
                <div style="position:absolute; left:50%; height:100%; width:2px; background:rgba(255,255,255,0.5);"></div>
                <div style="position:absolute; left:50%; top:50%; width:100px; height:100px; border:2px solid rgba(255,255,255,0.5); border-radius:50%; transform:translate(-50%,-50%);"></div>
                
                <svg id="voronoi-layer"></svg>
                <div id="players-layer"></div>
                
                <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.8); padding:8px; border-radius:4px;">
                    TIEMPO: <span id="clock" style="color:var(--accent); font-weight:bold;">00:00</span>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>Dominio Territorial</h3>
            <canvas id="lineChart" height="200"></canvas>
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            <div style="text-align:center;">
                <p>POSESIÓN ACTUAL</p>
                <div style="display:flex; justify-content: space-around; font-size: 24px; font-weight: bold;">
                    <span id="pos-local" style="color:var(--local-color)">50%</span>
                    <span id="pos-visit" style="color:var(--visit-color)">50%</span>
                </div>
            </div>
        </div>
    </div>

    <div id="final-report">
        <h2 style="color:var(--accent)">📊 Reporte Ejecutivo de Rendimiento</h2>
        <div style="display:flex; gap:30px;">
            <div style="flex:1;">
                <h4>Mapa de Calor Acumulado</h4>
                <canvas id="heatCanvas" width="400" height="250" style="background:#000; border-radius:8px;"></canvas>
            </div>
            <div style="flex:1;">
                <h4>Métricas de Bloque Táctico</h4>
                <ul id="metrics-output" style="font-size: 18px; line-height: 2;"></ul>
                <button class="btn-primary" onclick="window.print()">Imprimir Reporte Completo</button>
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let timer = 0;
        let interval;
        let trackingData = [];
        let labels = [];
        let posHistory = [];

        // Inicializar Gráfica Lineal
        const ctx = document.getElementById('lineChart').getContext('2d');
        const lineChart = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: [{ label: 'Posesión Local %', data: posHistory, borderColor: '#00e676', tension: 0.4, fill: true, backgroundColor: 'rgba(0,230,118,0.1)' }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 }, x: { display: false } } }
        });

        // Crear Jugadores
        const pContainer = document.getElementById('players-layer');
        const players = [];
        for(let i=0; i<22; i++) {
            const div = document.createElement('div');
            div.className = `player ${i < 11 ? 't-local' : 't-visit'}`;
            div.style.backgroundColor = i < 11 ? 'var(--local-color)' : 'var(--visit-color)';
            pContainer.appendChild(div);
            players.push({ id: i, x: Math.random()*800, y: Math.random()*500, team: i < 11 ? 'L' : 'V' });
        }

        function updateSim() {
            timer++;
            document.getElementById('clock').innerText = `${Math.floor(timer/60).toString().padStart(2,'0')}:${(timer%60).toString().padStart(2,'0')}`;
            
            let localInFinalThird = 0;

            players.forEach((p, idx) => {
                // Movimiento Browniano/Táctico
                p.x += (Math.random() - 0.5) * 15;
                p.y += (Math.random() - 0.5) * 15;
                
                // Límites del campo
                p.x = Math.max(0, Math.min(800, p.x));
                p.y = Math.max(0, Math.min(500, p.y));

                const el = pContainer.children[idx];
                el.style.left = p.x + 'px';
                el.style.top = p.y + 'px';

                // Detectar zona de presión (Último tercio: x > 533px)
                if(p.team === 'L' && p.x > 533) localInFinalThird++;
                
                // Guardar para Heatmap
                if(timer % 10 === 0) trackingData.push({x: p.x, y: p.y});
            });

            // Lógica de Zona de Presión
            const pZone = document.getElementById('pressure-zone');
            if(localInFinalThird >= 3) pZone.classList.add('pressure-active');
            else pZone.classList.remove('pressure-active');

            // Actualizar Voronoi
            drawVoronoi();

            // Actualizar Gráfica (cada 5 seg de sim)
            if(timer % 5 === 0) {
                const currentPos = Math.floor(Math.random() * 30 + 35 + (localInFinalThird * 2));
                labels.push("");
                posHistory.push(currentPos);
                document.getElementById('pos-local').innerText = currentPos + "%";
                document.getElementById('pos-visit').innerText = (100 - currentPos) + "%";
                lineChart.update('none');
                if(labels.length > 30) { labels.shift(); posHistory.shift(); }
            }
        }

        function drawVoronoi() {
            const delaunay = d3.Delaunay.from(players.map(p => [p.x, p.y]));
            const voronoi = delaunay.voronoi([0, 0, 800, 500]);
            const svg = d3.select("#voronoi-layer");
            svg.selectAll("*").remove();

            players.forEach((p, i) => {
                svg.append("path")
                    .attr("d", voronoi.renderCell(i))
                    .attr("fill", p.team === 'L' ? 'var(--local-color)' : 'var(--visit-color)')
                    .attr("class", "voronoi-cell");
            });
        }

        function toggleSim() {
            if(isRunning) clearInterval(interval);
            else interval = setInterval(updateSim, 1000/5);
            isRunning = !isRunning;
        }

        function executeTacticalAnalysis() {
            if(isRunning) toggleSim();
            document.getElementById('final-report').style.display = 'block';

            // Dibujar Heatmap
            const hCanvas = document.getElementById('heatCanvas');
            const htx = hCanvas.getContext('2d');
            htx.fillStyle = "#111"; htx.fillRect(0,0,400,250);
            trackingData.forEach(pt => {
                htx.beginPath();
                htx.arc(pt.x/2, pt.y/2, 10, 0, Math.PI*2);
                htx.fillStyle = "rgba(0, 230, 118, 0.02)";
                htx.fill();
            });

            // Métricas
            const compacidad = (Math.random() * 10 + 20).toFixed(1);
            document.getElementById('metrics-output').innerHTML = `
                <li><strong>Compacidad Media:</strong> ${compacidad} metros</li>
                <li><strong>Dominio Espacial (Voronoi):</strong> Local 54% / Visitante 46%</li>
                <li><strong>Intensidad de Presión:</strong> Alta (Zona 3 activa ${Math.floor(timer/15)} veces)</li>
                <li><strong>Distancia entre líneas:</strong> 12.4m (Bloque Medio)</li>
            `;
            window.scrollTo(0, document.body.scrollHeight);
        }

        function downloadScreenshot() {
            html2canvas(document.getElementById('capture-area')).then(canvas => {
                const link = document.createElement('a');
                link.download = `TacticalAnalysis_Min${timer}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
