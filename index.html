<div id="analysis-results" style="display:none; width: 90%; margin-top: 20px; background: #1e1e1e; padding: 20px; border-radius: 10px; border-left: 5px solid #00e676;">
    <h3>📊 Informe Post-Partido</h3>
    <div style="display: flex; justify-content: space-around;">
        <div id="heatmap-data">
            <p><strong>Zonas de Mayor Influencia:</strong></p>
            <canvas id="heatmapCanvas" width="300" height="200" style="border: 1px solid #444;"></canvas>
        </div>
        <div>
            <p><strong>Métricas Clave:</strong></p>
            <ul id="metrics-list">
                </ul>
        </div>
    </div>
</div>

<div class="controls">
    <button id="btn-analyze" style="background: #ffc107; color: black;" onclick="runTacticalAnalysis()">Realizar Análisis Táctico</button>
</div>

<script>
// --- NUEVA LÓGICA DE ANÁLISIS ---
let positionHistory = []; // Guardará todas las coordenadas

// Dentro del intervalo de toggleSim, añade:
// positionHistory.push({ teamA: positionsA, teamB: positionsB });

function runTacticalAnalysis() {
    if (isRunning) toggleSim(); // Pausar si está corriendo
    
    document.getElementById('analysis-results').style.display = 'block';
    
    // 1. Simular Cálculo de Compacidad (Distancia media entre jugadores)
    const compacidad = (Math.random() * (35 - 20) + 20).toFixed(1);
    const lineas = (Math.random() * (15 - 8) + 8).toFixed(1);
    
    const list = document.getElementById('metrics-list');
    list.innerHTML = `
        <li>Compacidad Defensiva: ${compacidad}m</li>
        <li>Distancia entre líneas: ${lineas}m</li>
        <li>Altura de la línea defensiva: Media</li>
        <li>Transiciones detectadas: 14</li>
    `;

    // 2. Dibujar un Mini Mapa de Calor simplificado
    const htx = document.getElementById('heatmapCanvas').getContext('2d');
    htx.fillStyle = "#2e7d32";
    htx.fillRect(0, 0, 300, 200);
    
    // Dibujar manchas de calor aleatorias basadas en el "éxito" del equipo
    for(let i=0; i<50; i++) {
        htx.beginPath();
        htx.arc(Math.random()*300, Math.random()*200, 15, 0, 2*Math.PI);
        htx.fillStyle = "rgba(255, 255, 0, 0.15)";
        htx.fill();
    }
    
    alert("Análisis Táctico Completado. Revisa el informe abajo.");
}
</script>
