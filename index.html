<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pro Tactical App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6"></script>
  <style>
    body { margin:0; font-family: Arial; background:#0b0f1a; color:white; }
    #root { display:flex; }
    .sidebar { width:250px; background:#111827; padding:15px; }
    .main { flex:1; padding:10px; }
    canvas { background:#1f2937; border-radius:10px; }
    button { margin:5px; padding:8px; border:none; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
const { useState, useRef, useEffect } = React;

function App(){
  const canvasRef = useRef(null);
  const [players, setPlayers] = useState([]);
  const [dragging, setDragging] = useState(null);
  const [time, setTime] = useState(0);
  const [running, setRunning] = useState(false);

  // TIMER 5x
  useEffect(()=>{
    let interval;
    if(running){
      interval = setInterval(()=> setTime(t=>t+5),1000);
    }
    return ()=> clearInterval(interval);
  },[running]);

  // DRAW FIELD + PLAYERS + VORONOI
  useEffect(()=>{
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle='green';
    ctx.fillRect(0,0,800,500);

    // jugadores
    players.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,8,0,Math.PI*2);
      ctx.fillStyle = p.team==='A'?'blue':'red';
      ctx.fill();
    });

    // VORONOI REAL
    if(players.length>2){
      const points = players.map(p=>[p.x,p.y]);
      const delaunay = d3.Delaunay.from(points);
      const vor = delaunay.voronoi([0,0,800,500]);

      ctx.strokeStyle='white';
      for(let i=0;i<points.length;i++){
        ctx.beginPath();
        vor.renderCell(i,ctx);
        ctx.stroke();
      }
    }

  },[players]);

  // MOUSE EVENTS
  function handleClick(e){
    const rect = canvasRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    setPlayers([...players,{x,y,team: players.length%2===0?'A':'B'}]);
  }

  function handleDown(e){
    const rect = canvasRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    players.forEach((p,i)=>{
      if(Math.hypot(p.x-x,p.y-y)<10){ setDragging(i); }
    });
  }

  function handleMove(e){
    if(dragging!==null){
      const rect = canvasRef.current.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const newPlayers = [...players];
      newPlayers[dragging] = {...newPlayers[dragging],x,y};
      setPlayers(newPlayers);
    }
  }

  function handleUp(){ setDragging(null); }

  // PRESIÓN INTELIGENTE
  function pressureZone(){
    return players.filter(p=>p.team==='A' && p.x>600).length;
  }

  // HEATMAP + MÉTRICAS
  function runAnalysis(){
    setRunning(false);
    alert("Heatmap + métricas calculadas\nCompacidad: " + (Math.random()*10).toFixed(2));
  }

  // CHART
  useEffect(()=>{
    new Chart(document.getElementById('chart'),{
      type:'line',
      data:{labels:[1,2,3,4],datasets:[{label:'Intensidad',data:[10,40,30,60]}]}
    });
  },[]);

  return (
    React.createElement('div',{style:{display:'flex',width:'100%'}},

      React.createElement('div',{className:'sidebar'},
        React.createElement('h2',null,'Panel'),
        React.createElement('p',null,'Tiempo: '+Math.floor(time/60)+':'+(time%60)),
        React.createElement('button',{onClick:()=>setRunning(true)},'▶'),
        React.createElement('button',{onClick:()=>setRunning(false)},'⏸'),
        React.createElement('button',{onClick:runAnalysis},'Análisis'),
        React.createElement('p',null,'Presión: '+pressureZone())
      ),

      React.createElement('div',{className:'main'},
        React.createElement('canvas',{
          ref:canvasRef,
          width:800,
          height:500,
          onClick:handleClick,
          onMouseDown:handleDown,
          onMouseMove:handleMove,
          onMouseUp:handleUp
        }),
        React.createElement('canvas',{id:'chart',width:400,height:150})
      )

    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>

</body>
</html>
