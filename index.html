<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TacticalFlow Elite - AI Duel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --pitch: #1a472a; --accent: #00e676; --local: #ff4444; --visit: #448aff; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; margin: 0; overflow: hidden; touch-action: none; }
        .app { display: flex; flex-direction: column; height: 100vh; }
        header { background: #000; padding: 10px; text-align: center; border-bottom: 2px solid var(--accent); font-size: 0.8rem; letter-spacing: 1px; }
        
        #pitch-container { 
            position: relative; width: 96%; aspect-ratio: 3/2; margin: 5px auto;
            background: var(--pitch); border: 2px solid white; border-radius: 8px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        svg#overlay-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 8; }
        .v-cell { stroke: rgba(255,255,255,0.03); fill-opacity: 0.1; }
        .pass-line { stroke-width: 2.5; stroke-dasharray: 6; opacity: 0.8; transition: stroke 0.2s; }
        
        .player { position: absolute; width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid #fff; transform: translate(-50%, -50%); z-index: 10; transition: transform 0.08s linear; }
        
        /* Joystick Moderno */
        #joy-zone { position: absolute; bottom: 25px; left: 25px; width: 90px; height: 90px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 100; backdrop-filter: blur(5px); }
        #joy-stick { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; position: absolute; top: 25px; left: 25px; box-shadow: 0 0 15px var(--accent); }

        .ui { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #111; border-top: 1px solid #333; }
        button { padding: 14px; border-radius: 10px; border: none; font-weight: bold; background: #222; color: white; font-size: 0.8rem; text-transform: uppercase; }
        .active { background: var(--accent); color: black; box-shadow: 0 0 10px rgba(0,230,118,0.5); }
    </style>
</head>
<body>

<header>TACTICALFLOW <span style="color:var(--accent)">AI DUEL PRO</span></header>

<div class="app">
    <div id="pitch-container">
        <svg id="overlay-layer"></svg>
        <div id="players"></div>
        <div id="joy-zone"><div id="joy-stick"></div></div>
    </div>

    <div class="ui">
        <button id="playBtn" class="active" onclick="toggle()">PLAY / PAUSE</button>
        <button onclick="analyzePases()">DATOS DE VISIÓN</button>
        <button onclick="snapTactics()">CAPTURAR</button>
        <button onclick="location.reload()" style="background:#444">RESETEAR AI</button>
    </div>
</div>

<script>
    let run = false, t = 0, loop, players = [];
    let joy = { x: 0, y: 0 }, dragging = false;
    const W = 400, H = 266; // Coordenadas internas
    const AI_SPEED = 0.6; // Velocidad de reacción de la IA

    // Inicializar Jugadores (11 vs 11)
    const pDiv = document.getElementById('players');
    for(let i=0; i<22; i++) {
        // Posiciones iniciales tácticas (4-4-2 vs 4-4-2)
        let x, y;
        if(i<11) { // Local
            x = (i === 0) ? 150 : Math.random()*150 + 50;
            y = Math.random()*H;
        } else { // Visitante (IA)
            x = Math.random()*150 + 200;
            y = Math.random()*H;
        }
        players.push({ x: x, y: y, team: i<11?'L':'V' });
        
        let d = document.createElement('div');
        d.className = 'player';
        d.style.backgroundColor = i<11 ? 'var(--local)' : 'var(--visit)';
        if(i===0) d.style.boxShadow = "0 0 20px #fff, 0 0 30px var(--accent)";
        pDiv.appendChild(d);
    }

    // Joystick Logic
    const zone = document.getElementById('joy-zone');
    const stick = document.getElementById('joy-stick');
    zone.addEventListener('touchstart', (e) => { dragging = true; e.preventDefault(); });
    window.addEventListener('touchmove', (e) => {
        if(!dragging) return;
        const r = zone.getBoundingClientRect();
        const touch = e.touches[0];
        let dx = touch.clientX - (r.left + 45);
        let dy = touch.clientY - (r.top + 45);
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 35);
        const ang = Math.atan2(dy, dx);
        joy.x = Math.cos(ang) * dist / 35;
        joy.y = Math.sin(ang) * dist / 35;
        stick.style.transform = `translate(${joy.x*35}px, ${joy.y*35}px)`;
    });
    window.addEventListener('touchend', () => { dragging = false; joy = {x:0,y:0}; stick.style.transform = 'none'; });

    function update() {
        t++;
        // Mover Capitán (ID 0)
        players[0].x += joy.x * 9; players[0].y += joy.y * 9;
        
        const container = document.getElementById('pitch-container');
        const rW = container.offsetWidth / W;
        const rH = container.offsetHeight / H;

        // IA ENEMIGA (IDs 11-21)
        for(let j=11; j<22; j++) {
            let interceptor = players[j];
            // Encontrar la línea de pase más "peligrosa" (la más cercana)
            let closestLine = null;
            let minDist = 999;
            
            for(let i=1; i<11; i++) {
                let dPase = distToSegment(interceptor, players[0], players[i]);
                if(dPase < minDist) { minDist = dPase; closestLine = {start: players[0], end: players[i]}; }
            }
            
            // Moverse para interceptar la línea más cercana
            if(closestLine && minDist < 60) {
                // Calcular punto óptimo de intercepción (proyección en el segmento)
                let pOptimo = getClosestPointOnSegment(interceptor, closestLine.start, closestLine.end);
                interceptor.x += (pOptimo.x - interceptor.x) * AI_SPEED * (Math.random()*0.3+0.7);
                interceptor.y += (pOptimo.y - interceptor.y) * AI_SPEED * (Math.random()*0.3+0.7);
            } else {
                // Movimiento defensivo base (mantener bloque)
                interceptor.x += (Math.random()-0.5)*3; interceptor.y += (Math.random()-0.5)*3;
            }
        }

        // Movimiento local (IA aliada simple)
        for(let i=1; i<11; i++) { players[i].x += (Math.random()-0.5)*4; players[i].y += (Math.random()-0.5)*4; }

        // Colisiones y Renderizado
        players.forEach((p, i) => {
            p.x = Math.max(0, Math.min(W, p.x)); p.y = Math.max(0, Math.min(H, p.y));
            pDiv.children[i].style.left = (p.x * rW) + "px";
            pDiv.children[i].style.top = (p.y * rH) + "px";
        });

        drawVisuals(rW, rH);
    }

    function drawVisuals(rW, rH) {
        const svg = d3.select("#overlay-layer");
        svg.selectAll("*").remove();

        // 1. Voronoi
        const delaunay = d3.Delaunay.from(players.map(p => [p.x*rW, p.y*rH]));
        const voronoi = delaunay.voronoi([0, 0, W*rW, H*rH]);
        players.forEach((p, i) => {
            svg.append("path").attr("d", voronoi.renderCell(i))
               .attr("fill", p.team==='L'?'var(--local)':'var(--visit)').attr("class", "v-cell");
        });

        // 2. Líneas de Pase Dinámicas (con Detección de Bloqueo IA)
        let pasesClaros = 0;
        for(let i=1; i<11; i++) {
            let blocked = false;
            // Verificar si algún rival (11-21) corta la línea de pase
            for(let j=11; j<22; j++) {
                if(distToSegment(players[j], players[0], players[i]) < 12) { blocked = true; break; }
            }
            if(!blocked) pasesClaros++;
            svg.append("line")
               .attr("x1", players[0].x*rW).attr("y1", players[0].y*rH)
               .attr("x2", players[i].x*rW).attr("y2", players[i].y*rH)
               .attr("stroke", blocked ? "rgba(255,255,255,0.05)" : "var(--accent)")
               .attr("class", "pass-line");
        }
        t/10 % 10 === 0 && (window.pasesActuales = pasesClaros); // Guardar para análisis
    }

    // --- Funciones Geométricas Avanzadas ---
    function distToSegment(p, v, w) {
        let pOptimo = getClosestPointOnSegment(p, v, w);
        return Math.sqrt(Math.pow(p.x - pOptimo.x, 2) + Math.pow(p.y - pOptimo.y, 2));
    }

    function getClosestPointOnSegment(p, v, w) {
        const l2 = Math.pow(v.x-w.x, 2) + Math.pow(v.y-w.y, 2);
        if (l2 == 0) return v;
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) };
    }

    function toggle() { if(run) clearInterval(loop); else loop = setInterval(update, 1000/5); run = !run; document.getElementById('playBtn').classList.toggle('active'); }
    function analyzePases() { alert("IA Report: Tienes " + window.pasesActuales + " líneas de pases limpias. La IA enemiga está priorizando cerrar los pases cortos."); }
    function snapTactics() { html2canvas(document.body).then(c => { const a = document.createElement('a'); a.download='ai_duel.png'; a.href=c.toDataURL(); a.click(); }); }
</script>
</body>
</html>
